      <line x1="0" y1="8" x2="109" y2="264" stroke="#b87adb" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Violet accent bar — bottom -->
  <rect x="55" y="454" width="402" height="3" rx="1.5" fill="#b87adb" opacity="0.377"/>
