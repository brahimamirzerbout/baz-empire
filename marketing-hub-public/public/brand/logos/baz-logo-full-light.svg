  <!-- Violet accent bar — top -->
  <rect x="55" y="55" width="402" height="3" rx="1.5" fill="#b87adb" opacity="0.377"/>
  
  <!-- B letterform -->
  <g transform="translate(55, 120)">
    <rect x="0" y="0" width="8" height="272" rx="4" fill="#b87adb"/>
    <rect x="0" y="0" width="89" height="8" rx="4" fill="#b87adb"/>
    <rect x="0" y="89" width="89" height="8" rx="4" fill="#b87adb"/>
    <rect x="81" y="0" width="8" height="97" rx="4" fill="#b87adb"/>
    <path d="M 89 0 Q 144 0 144 48.5 Q 144 97 89 97" fill="#b87adb"/>
    <rect x="81" y="185" width="8" height="8" rx="4" fill="#b87adb"/>
    <path d="M 89 97 Q 155 97 155 169 Q 155 272 89 272" fill="#b87adb" opacity="0.9"/>
    
    <!-- A -->
    <g transform="translate(175, 0)">
      <path d="M 0 272 L 72 0 L 144 272 H 120 L 105 210 H 39 L 24 272 Z M 48 144 L 72 72 L 96 144 Z" fill="#b87adb"/>
    </g>
    
    <!-- Z -->
    <g transform="translate(340, 0)">
