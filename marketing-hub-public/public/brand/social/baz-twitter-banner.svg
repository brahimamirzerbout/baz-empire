<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <!-- BAZ Twitter/X Banner — 1500×500
       Luxury dark void, violet glow, geometric BAZ mark
  -->
  <defs>
    <radialGradient id="tw-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#b87adb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="tw-dots" width="21" height="21" patternUnits="userSpaceOnUse">
      <circle cx="10.5" cy="10.5" r="0.4" fill="#b87adb" opacity="0.06"/>
    </pattern>
  </defs>
  
  <rect width="1500" height="500" fill="#0a0a0d"/>
  <rect width="1500" height="500" fill="url(#tw-dots)"/>
  <rect width="1500" height="500" fill="url(#tw-glow)"/>
  
  <!-- Top accent -->
  <rect x="0" y="0" width="1500" height="2" fill="#b87adb" opacity="0.377"/>
  
  <!-- BAZ centered -->
  <g transform="translate(525, 80)">
    <rect x="0" y="0" width="10" height="300" rx="5" fill="#b87adb"/>
    <rect x="0" y="0" width="90" height="10" rx="5" fill="#b87adb"/>
    <rect x="0" y="95" width="90" height="10" rx="5" fill="#b87adb"/>
    <rect x="80" y="0" width="10" height="105" rx="5" fill="#b87adb"/>
    <path d="M 90 0 Q 150 0 150 52 Q 150 105 90 105" fill="#b87adb"/>
    <rect x="80" y="195" width="10" height="10" rx="5" fill="#b87adb"/>
    <path d="M 90 105 Q 165 105 165 190 Q 165 300 90 300" fill="#b87adb" opacity="0.88"/>
    
    <g transform="translate(185, 0)">
      <path d="M 0 300 L 75 0 L 150 300 H 123 L 108 230 H 42 L 27 300 Z M 50 160 L 75 78 L 100 160 Z" fill="#b87adb"/>
    </g>
    
    <g transform="translate(370, 0)">
      <rect x="0" y="0" width="120" height="10" rx="5" fill="#b87adb"/>
      <rect x="0" y="290" width="120" height="10" rx="5" fill="#b87adb"/>
      <rect x="110" y="0" width="10" height="300" rx="5" fill="#b87adb" opacity="0.55"/>
      <line x1="0" y1="10" x2="110" y2="290" stroke="#b87adb" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Tagline -->
  <text x="750" y="430" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="14" font-weight="300" letter-spacing="0.45em" fill="#b87adb" opacity="0.75" text-anchor="middle">THE GROWTH PARTNER FOR AMBITIOUS BUSINESSES</text>
  
  <!-- Bottom accent -->
  <rect x="0" y="498" width="1500" height="2" fill="#b87adb" opacity="0.377"/>
</svg>