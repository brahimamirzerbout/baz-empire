<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- BAZ OG Image — 1200×630 for social sharing (Twitter/X, LinkedIn, Facebook)
       Dark void background with violet accent, luxury typography
  -->
  <defs>
    <!-- Radial violet glow behind logo -->
    <radialGradient id="og-glow" cx="50%" cy="45%" r="45%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#b87adb" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#b87adb" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0d" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="og-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="none"/>
      <circle cx="0" cy="0" r="0.5" fill="#b87adb" opacity="0.08"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0d"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>
  
  <!-- Top accent line -->
  <rect x="55" y="0" width="1090" height="2" fill="#b87adb" opacity="0.377"/>
  
  <!-- BAZ Letterforms — centered, large -->
  <g transform="translate(310, 145)">
    <!-- B -->
    <rect x="0" y="0" width="13" height="340" rx="6.5" fill="#b87adb"/>
    <rect x="0" y="0" width="110" height="13" rx="6.5" fill="#b87adb"/>
    <rect x="0" y="110" width="110" height="13" rx="6.5" fill="#b87adb"/>
    <rect x="97" y="0" width="13" height="123" rx="6.5" fill="#b87adb"/>
    <path d="M 110 0 Q 180 0 180 55 Q 180 123 110 123" fill="#b87adb"/>
    <rect x="97" y="227" width="13" height="13" rx="6.5" fill="#b87adb"/>
    <path d="M 110 123 Q 195 123 195 205 Q 195 340 110 340" fill="#b87adb" opacity="0.88"/>
    
    <!-- A -->
    <g transform="translate(220, 0)">
      <path d="M 0 340 L 90 0 L 180 340 H 148 L 130 260 H 50 L 32 340 Z M 60 180 L 90 90 L 120 180 Z" fill="#b87adb"/>
    </g>
    
    <!-- Z -->
    <g transform="translate(430, 0)">
      <rect x="0" y="0" width="145" height="13" rx="6.5" fill="#b87adb"/>
      <rect x="0" y="327" width="145" height="13" rx="6.5" fill="#b87adb"/>
      <rect x="132" y="0" width="13" height="340" rx="6.5" fill="#b87adb" opacity="0.55"/>
      <line x1="0" y1="13" x2="132" y2="327" stroke="#b87adb" stroke-width="13" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Tagline -->
  <text x="600" y="555" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="13" font-weight="300" letter-spacing="0.4em" fill="#b87adb" opacity="0.8" text-anchor="middle">GROWTH PARTNER</text>
  
  <!-- Subtitle -->
  <text x="600" y="585" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="400" letter-spacing="0.2em" fill="#6e6879" text-anchor="middle">STRATEGY · CREATIVE · MEDIA · REVENUE</text>
  
  <!-- Bottom accent line -->
  <rect x="55" y="628" width="1090" height="2" fill="#b87adb" opacity="0.377"/>
</svg>