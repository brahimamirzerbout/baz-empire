<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- BAZ Dot Grid Pattern — for backgrounds, dividers, decorative accents
       Fibonacci-spaced dots at golden-ratio opacity levels
  -->
  <defs>
    <pattern id="baz-dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <!-- Fibonacci 34px grid -->
      <circle cx="0" cy="0" r="0.8" fill="#b87adb" opacity="0.144"/>
      <circle cx="34" cy="0" r="0.8" fill="#b87adb" opacity="0.144"/>
      <circle cx="0" cy="34" r="0.8" fill="#b87adb" opacity="0.144"/>
      <circle cx="34" cy="34" r="0.8" fill="#b87adb" opacity="0.144"/>
      <!-- Midpoint accents (Fibonacci 13) -->
      <circle cx="13" cy="13" r="0.4" fill="#b87adb" opacity="0.089"/>
      <circle cx="21" cy="13" r="0.4" fill="#b87adb" opacity="0.089"/>
      <circle cx="13" cy="21" r="0.4" fill="#b87adb" opacity="0.089"/>
      <circle cx="21" cy="21" r="0.4" fill="#b87adb" opacity="0.089"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#baz-dots)"/>
</svg>